        function buildFiles(cad) {
            const files = {};
            // Arquivos base que todos têm
            files.comprovantePis = fakeFile('pis_' + cad.nomeCompleto.split(' ')[0].toLowerCase() + '.pdf', 'application/pdf');
            files.comprovanteResidencia = fakeFile('residencia_' + cad.nomeCompleto.split(' ')[0].toLowerCase() + '.pdf', 'application/pdf');
            files.comprovanteEscolaridade = fakeFile('escolaridade_' + cad.nomeCompleto.split(' ')[0].toLowerCase() + '.pdf', 'application/pdf');
            files.ctpsDigital = fakeFile('ctps_' + cad.nomeCompleto.split(' ')[0].toLowerCase() + '.pdf', 'application/pdf');
            files.pdfCarteiraTrabalho = fakeFile('carteira_' + cad.nomeCompleto.split(' ')[0].toLowerCase() + '.pdf', 'application/pdf');
            files.foto3x4 = fakeFile('foto_' + cad.nomeCompleto.split(' ')[0].toLowerCase() + '.png', 'image/png');

            // Condicionais
            if (cad.sexo === 'Masculino') {
                files.certificadoReservista = fakeFile('reservista_' + cad.nomeCompleto.split(' ')[0].toLowerCase() + '.pdf', 'application/pdf');
            }
            if (cad.estadoCivil === 'Casado(a)' || cad.estadoCivil === 'União estável') {
                files.certidaoCasamento = fakeFile('casamento_' + cad.nomeCompleto.split(' ')[0].toLowerCase() + '.pdf', 'application/pdf');
            }
            if (cad.motorista === 'Sim') {
                files.cnhDocumento = fakeFile('cnh_' + cad.nomeCompleto.split(' ')[0].toLowerCase() + '.jpg', 'image/jpeg');
            }
            if (cad.filhos === 'Sim') {
                files.certidaoFilhos = fakeFile('filhos_' + cad.nomeCompleto.split(' ')[0].toLowerCase() + '.pdf', 'application/pdf');
            }
            return files;
        }

        async function seedData() {

            for (let i = 0; i < testCadastros.length; i++) {
                const cad = testCadastros[i];
                log(`\n[${i + 1}/20] Enviando: ${cad.nomeCompleto} (${cad.empresa})...`);

                const payload = {
                    formData: {
                        timestamp: new Date().toLocaleString('pt-BR'),
                        empresa: cad.empresa,
                        enviadoPor: cad.emailColaborador,
                        nomeCompleto: cad.nomeCompleto,
                        telefone: cad.telefone,
                        dataNascimento: cad.dataNascimento,
                        sexo: cad.sexo,
                        estadoCivil: cad.estadoCivil,
                        nomePai: cad.nomePai,
                        nomeMae: cad.nomeMae,
                        rg: cad.rg,
                        cpf: cad.cpf,
                        motorista: cad.motorista,
                        pis: cad.pis,
                        emailColaborador: cad.emailColaborador,
                        endereco: cad.endereco,
                        bairro: cad.bairro,
                        cidadeEstado: cad.cidadeEstado,
                        escolaridade: cad.escolaridade,
                        contaItau: cad.contaItau,
                        filhos: cad.filhos,
                        documentoEtnia: cad.documentoEtnia,
                        valeTransporte: cad.valeTransporte,
                        declaracao: cad.declaracao
                    },
                    files: buildFiles(cad),
                    nomeColaborador: cad.nomeCompleto
                };

                try {
                    const response = await fetch(URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });

                    try {
                        const result = await response.json();
                        log(`   ✓ Sucesso! Pasta: ${result.folder || 'criada'}`);
                    } catch (e) {
                        log(`   ✓ Enviado (sem resposta JSON)`);
                    }
                } catch (error) {
                    log(`   ✗ Erro: ${error.message}`);
                }

                // Esperar 3s entre envios para não sobrecarregar o Apps Script
                if (i < testCadastros.length - 1) {
                    log('   Aguardando 3s...');
                    await new Promise(r => setTimeout(r, 3000));
                }
            }

            log('\n========================================');
            log('PRONTO! 20 cadastros enviados.');
            log('4 por empresa (Rigarr1 a Rigarr5).');
            log('Abra o Dashboard e clique em Atualizar.');
            log('========================================');
            btn.disabled = false;
        }
